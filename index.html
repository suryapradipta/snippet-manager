<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snippet Manager</title>
  <!-- Add Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div id="app">
    <div class="search-container">
      <!-- SVG Search Icon -->
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input id="search-input" type="text" placeholder="Search snippets... (or Create New)" autocomplete="off" />
    </div>

    <ul id="results-list">
      <!-- Snippets will be injected here -->
    </ul>

    <!-- Add Snippet Form -->
    <div id="add-form" class="hidden">
      <input id="add-title" type="text" placeholder="Snippet Title" autocomplete="off" />
      <textarea id="add-content" placeholder="Paste your snippet here..." rows="4"></textarea>
    </div>

    <div class="footer">
      <div><kbd>↑</kbd> <kbd>↓</kbd> to navigate</div>
      <div><kbd>Enter</kbd> to paste</div>
      <div><kbd>Cmd+Ctrl+N</kbd> to add</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
