<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#818CF8",
                        "background-light": "#f5f6f8",
                        "background-dark": "#0a0a0f",
                        "glass-bg": "rgba(15, 15, 25, 0.7)",
                        "glass-border": "rgba(255, 255, 255, 0.1)",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .glass-morphism {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .syntax-keyword {
            color: #c678dd;
        }

        .syntax-string {
            color: #98c379;
        }

        .syntax-variable {
            color: #e06c75;
        }

        .syntax-comment {
            color: #5c6370;
            font-style: italic;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Decorative background elements -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-600/10 rounded-full blur-[120px]"></div>
    <!-- Modal Container -->
    <div
        class="relative w-full max-w-2xl glass-morphism bg-glass-bg rounded-xl shadow-2xl overflow-hidden border border-glass-border">
        <!-- Header -->
        <div class="flex items-center justify-between p-6 border-b border-glass-border">
            <div class="flex flex-col gap-1">
                <h1 class="text-slate-100 text-2xl font-bold tracking-tight">Create Snippet</h1>
                <p class="text-slate-400 text-sm">Define a new shortcut for your GlassOS workflow</p>
            </div>
            <button class="text-slate-400 hover:text-slate-100 transition-colors p-2 rounded-lg hover:bg-white/5">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <!-- Form Content -->
        <div class="p-6 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Label/Title -->
                <div class="flex flex-col gap-2">
                    <label class="text-slate-300 text-sm font-medium px-1">Label/Title</label>
                    <div class="relative group">
                        <input
                            class="w-full bg-black/20 border border-glass-border rounded-lg px-4 py-3 text-slate-100 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all"
                            placeholder="e.g. Welcome Message" type="text" />
                    </div>
                </div>
                <!-- Trigger -->
                <div class="flex flex-col gap-2">
                    <label class="text-slate-300 text-sm font-medium px-1">Trigger/Abbreviation</label>
                    <div class="relative group">
                        <input
                            class="w-full bg-black/20 border border-glass-border rounded-lg px-4 py-3 text-slate-100 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all font-mono"
                            placeholder="!welcome" type="text" />
                    </div>
                </div>
            </div>
            <!-- Content Area (Code Editor Style) -->
            <div class="flex flex-col gap-2">
                <div class="flex items-center justify-between px-1">
                    <label class="text-slate-300 text-sm font-medium">Content</label>
                    <span class="text-slate-500 text-xs font-mono uppercase tracking-widest">Markdown / Code</span>
                </div>
                <div class="relative rounded-lg border border-glass-border bg-black/40 overflow-hidden">
                    <!-- Line Numbers Simulation -->
                    <div
                        class="absolute left-0 top-0 bottom-0 w-10 bg-black/20 border-r border-glass-border flex flex-col items-center py-4 gap-1 text-[10px] text-slate-600 font-mono select-none">
                        <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span>
                    </div>
                    <!-- Editor Textarea -->
                    <textarea
                        class="w-full min-h-[200px] pl-14 pr-4 py-4 bg-transparent border-none text-slate-200 font-mono text-sm leading-relaxed focus:ring-0 resize-none"
                        placeholder="Write your snippet content here... use {variables} to automate inputs."></textarea>
                    <!-- Syntax Highlighting Preview Overlays (Visual only) -->
                    <div class="absolute bottom-4 right-4 pointer-events-none opacity-50">
                        <span
                            class="text-primary text-xs font-mono bg-primary/10 px-2 py-1 rounded border border-primary/20">Auto-detecting:
                            JavaScript</span>
                    </div>
                </div>
            </div>
            <!-- Variable Toolbar -->
            <div class="flex flex-wrap items-center gap-2 p-3 bg-white/5 rounded-lg border border-glass-border">
                <span class="text-slate-500 text-xs font-semibold uppercase tracking-wider px-2">Insert:</span>
                <button
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-white/5 hover:bg-white/10 text-slate-300 text-xs font-medium transition-all border border-glass-border">
                    <span class="material-symbols-outlined text-[18px]">calendar_today</span>
                    {date}
                </button>
                <button
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-white/5 hover:bg-white/10 text-slate-300 text-xs font-medium transition-all border border-glass-border">
                    <span class="material-symbols-outlined text-[18px]">content_paste</span>
                    {clipboard}
                </button>
                <button
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-white/5 hover:bg-white/10 text-slate-300 text-xs font-medium transition-all border border-glass-border">
                    <span class="material-symbols-outlined text-[18px]">ads_click</span>
                    {cursor}
                </button>
                <div class="h-4 w-px bg-glass-border mx-1"></div>
                <button
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-white/5 hover:bg-white/10 text-slate-300 text-xs font-medium transition-all border border-glass-border">
                    <span class="material-symbols-outlined text-[18px]">person</span>
                    {user_name}
                </button>
            </div>
        </div>
        <!-- Footer Actions -->
        <div class="flex items-center justify-between p-6 bg-black/20 border-t border-glass-border">
            <div class="flex items-center gap-4">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <div class="relative">
                        <input class="sr-only peer" type="checkbox" />
                        <div class="w-10 h-5 bg-slate-700 rounded-full peer-checked:bg-primary transition-colors"></div>
                        <div
                            class="absolute left-1 top-1 w-3 h-3 bg-white rounded-full transition-transform peer-checked:translate-x-5">
                        </div>
                    </div>
                    <span class="text-slate-400 text-xs font-medium group-hover:text-slate-200 transition-colors">Enable
                        immediately</span>
                </label>
            </div>
            <div class="flex gap-3">
                <button
                    class="px-5 py-2.5 rounded-lg text-slate-300 text-sm font-semibold hover:bg-white/5 transition-all">
                    Cancel
                </button>
                <button
                    class="px-6 py-2.5 rounded-lg bg-primary hover:bg-indigo-500 text-white text-sm font-bold shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined text-[20px]">save</span>
                    Save Snippet
                </button>
            </div>
        </div>
    </div>
</body>

</html>
